name: safe_qr_app
description: Safe QR — análise de QR codes com arquitetura em camadas.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  get_it: ^8.0.0
  dio: ^5.7.0
  flutter_dotenv: ^5.2.1
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0
  intl: ^0.20.0
  url_launcher: ^6.3.0
  google_fonts: ^6.2.0
  equatable: ^2.0.5
  uuid: ^4.5.0
  path: ^1.9.0
  path_provider: ^2.1.4
  sqflite: ^2.4.0
  shared_preferences: ^2.3.3
  collection: ^1.19.0
  async: ^2.13.0
  share_plus: ^10.1.4
  gal: ^2.3.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/.env
